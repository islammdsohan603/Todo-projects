<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- font-awesomlink -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwindcss links -->
  <link rel="stylesheet" href="/src/output.css">
  <link rel="stylesheet" href="style.css">


  <title>TODO</title>
</head>

<body class="bg-gray-500">
  <section class="flex items-center justify-center h-screen">
    <div class="bg-gray-300 w-2xl p-10 rounded-2xl shadow-2xl">
      <h1 class="text-3xl font-bold text-center text-blue-900"> <i class="fa-solid fa-clipboard-list"></i>TODO APP</h1>
      <div id="loader" class="hidden text-center mt-4 text-3xl font-semibold">
        Loading...
      </div>
      <div class="flex item-center justify-center my-3 gap-2.5">
        <input type="text" placeholder="Enter task..." class="w-10/12 bg-white p-4 rounded-xl shadow-2xs"
          id="taskInput">
        <button
          class="bg-blue-500 py-2 px-8 text-xl font-semibold rounded-xl cursor-pointer hover:shadow-2xl duration-150"
          id="addBtn">ADD</button>
      </div>
      <div class="flex items-center gap-3.5">
        <button
          class=" filterBtn py-1 px-6 text-xl font-semibold bg-blue-400 rounded-xl cursor-pointer hover:shadow-2xl duration-200">All</button>
        <button
          class=" filterBtn py-1 px-6 text-xl font-semibold rounded-xl cursor-pointer hover:shadow-2xl duration-200"">Compilted</button>
        <button class=" filterBtn py-1 px-6 text-xl font-semibold rounded-xl cursor-pointer hover:shadow-2xl
          duration-200"">Panding</button>
      </div>

      <ul id="taskList" class="mt-5 space-y-2"></ul>

    </div>
  </section>


  <script src="script.js"></script>

</body>

</html>
